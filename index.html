:root{
  --paper:#F6EFE2; --card:#FCF9F1; --edge:#E7DCC5; --rule:#DCD0BA; --line:#E0D5BF;
  --soft:#D6CBB6; --ink:#26221C; --black:#14110C; --accent:#FF5A36; --accent-dk:#D9401F;
  --muted:#8A8175; --chip-bg:#EFE6D2; --chip-tx:#6B6355; --tan:#C9A78F; --note:#57503F;
  --serif:'Spectral', Georgia, serif;
  --sans:'Work Sans', -apple-system, BlinkMacSystemFont, sans-serif;
}
*{box-sizing:border-box; margin:0; padding:0; -webkit-font-smoothing:antialiased}
html,body{height:100%; overscroll-behavior:none; overflow-x:hidden; touch-action:pan-y;
  background:radial-gradient(120% 120% at 50% 0%, #F0E7D6 0%, #E7DCC7 100%); background-attachment:fixed}
body{-webkit-tap-highlight-color:transparent; font-family:var(--sans)}
button{font-family:inherit; font-size:inherit; color:inherit; background:none; border:none; cursor:pointer}
input,textarea{font-family:inherit; color:inherit; background:none; border:none; outline:none; width:100%; padding:0}
input:focus-visible,textarea:focus-visible,button:focus-visible{outline:2px solid var(--accent); outline-offset:2px; border-radius:4px}
::placeholder{color:var(--soft)}
a{color:var(--accent); text-decoration:none}

#app{
  position:relative; width:100%; max-width:520px; margin:0 auto;
  height:100dvh; overflow:hidden; overflow-x:hidden; touch-action:pan-y;
  background:var(--paper); color:var(--ink);
  display:flex; flex-direction:column;
}
@media (min-width:560px){
  #app{height:min(940px,96dvh); margin:calc((100dvh - min(940px,96dvh))/2) auto;
    border-radius:34px; box-shadow:0 40px 80px -24px rgba(40,30,15,.45), 0 0 0 1px rgba(0,0,0,.06)}
}

/* ══ éléments partagés ══ */
.eyebrow{font-family:var(--sans); font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--accent); font-weight:600}
.chip{font-size:11px; font-weight:600; color:var(--chip-tx); background:var(--chip-bg); padding:3px 9px; border-radius:20px; white-space:nowrap}
.view{position:absolute; inset:0; display:none; flex-direction:column; overflow-x:hidden; touch-action:pan-y}
.view.on{display:flex}

/* ══ VUE LISTE ══ */
#vList{overflow-y:auto; -webkit-overflow-scrolling:touch;
  padding-top:env(safe-area-inset-top); padding-bottom:calc(30px + env(safe-area-inset-bottom))}
.hd{padding:28px 26px 20px; position:relative}
.hd .eyebrow{font-size:12px; letter-spacing:3px}
.hd h1{font-family:var(--serif); font-weight:600; font-size:46px; line-height:.95; margin:10px 0 0; letter-spacing:-1px}
.hd .meta{display:flex; gap:12px; margin-top:18px; font-size:13px; color:var(--muted); font-weight:500; align-items:center; flex-wrap:wrap}
.hd .meta s{color:var(--soft); text-decoration:none}
.hd .cd{font-size:11px; font-weight:600; color:var(--accent); background:rgba(255,90,54,.1); padding:3px 9px; border-radius:20px}
.hd .exp{position:absolute; top:calc(28px + env(safe-area-inset-top)); right:24px;
  font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:var(--chip-tx);
  background:var(--card); border:1px solid var(--edge); padding:8px 12px; border-radius:20px; white-space:nowrap}
.hd .exp:active{background:var(--chip-bg)}
.rule{height:1px; background:linear-gradient(90deg, transparent, var(--rule) 20%, var(--rule) 80%, transparent); margin:4px 26px 8px}
.cards{display:flex; flex-direction:column; gap:14px; padding:12px 20px 0}
.dcard{width:100%; text-align:left; background:var(--card); border:1px solid var(--edge); border-radius:22px;
  padding:16px; display:flex; gap:16px; align-items:stretch; box-shadow:0 8px 20px -16px rgba(60,45,20,.5)}
.dcard:active{transform:scale(.985); transition:transform .1s}
.dcard .dt{flex:0 0 58px; display:flex; flex-direction:column; align-items:center; justify-content:center;
  background:var(--ink); border-radius:16px; color:var(--paper); padding:8px 0}
.dcard .dt s{font-family:var(--serif); font-size:12px; text-transform:uppercase; letter-spacing:1px; color:var(--tan); text-decoration:none}
.dcard .dt b{font-family:var(--serif); font-size:26px; font-weight:600; line-height:1}
.dcard .tx{flex:1; min-width:0}
.dcard .tx h3{font-family:var(--serif); font-size:20px; font-weight:600; line-height:1.1; margin-top:2px}
.dcard .tx p{font-size:12.5px; color:var(--muted); margin-top:6px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.dcard .tx .chips{display:flex; gap:6px; margin-top:10px; align-items:center}
.dcard.mapcard{background:var(--ink); border-color:var(--ink)}
.dcard.mapcard .mapdt{background:var(--accent); font-size:26px; display:flex; align-items:center; justify-content:center}
.dcard.mapcard h3{color:var(--paper)}
.dcard.mapcard p{color:var(--tan)}
.dcard.mapcard .chip{background:rgba(255,255,255,.12); color:var(--paper)}

/* ══ VUE DÉTAIL ══ */
#vDetail{overflow-y:auto; -webkit-overflow-scrolling:touch; background:var(--paper)}
.mapbox{position:relative; height:340px; flex:none; background:#2B3A2E; overflow:hidden; transition:height .28s ease}
.mapbox.big{position:fixed; inset:0; height:100dvh; z-index:700; border-radius:0}
#map{position:absolute; inset:0}
.leaflet-container{background:#2B3A2E; font-family:var(--sans)}
.mtop{position:absolute; top:calc(14px + env(safe-area-inset-top)); left:0; right:0; z-index:500;
  display:flex; align-items:center; justify-content:space-between; padding:0 18px; pointer-events:none}
.mlegend{position:absolute; bottom:10px; left:14px; z-index:500; display:flex; flex-direction:column; gap:4px;
  background:rgba(252,249,241,.9); backdrop-filter:blur(6px); padding:8px 11px; border-radius:12px;
  box-shadow:0 4px 12px -4px rgba(0,0,0,.3); pointer-events:none}
.mlegend span{display:flex; align-items:center; gap:6px; font-size:10px; font-weight:600; color:var(--ink)}
.mlegend .lin{width:16px; height:2px; border-radius:2px}
.mlegend .lin-main{background:#D9401F}
.mlegend .lin-side{background:repeating-linear-gradient(90deg,#9C9186 0 3px, transparent 3px 5px)}
.mtop > *{pointer-events:auto}
.circ{width:40px; height:40px; border-radius:50%; background:rgba(252,249,241,.92); backdrop-filter:blur(6px);
  display:flex; align-items:center; justify-content:center; box-shadow:0 4px 12px -4px rgba(0,0,0,.35);
  color:var(--ink); font-size:20px; flex:none}
.mtopRight{display:flex; gap:8px; align-items:center}
.pill{background:rgba(252,249,241,.92); backdrop-filter:blur(6px); padding:7px 14px; border-radius:20px;
  font-size:12px; font-weight:600; color:var(--ink); box-shadow:0 4px 12px -4px rgba(0,0,0,.35)}
.pill.on{background:#0039A6; color:#fff}
.pill:active{background:#fff}
.pin{cursor:pointer}
.pin i{display:block; border-radius:50% 50% 50% 2px; transform:rotate(45deg);

/* Distance à vol d'oiseau (km) — sert uniquement à choisir un mode de trajet suggéré */
function haversine(lat1,lng1,lat2,lng2){
  const R = 6371, toRad = x => x*Math.PI/180;
  const dLat = toRad(lat2-lat1), dLng = toRad(lng2-lng1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLng/2)**2;
  return R * 2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
/* Suggestion de trajet — estimation à vol d'oiseau, pas un vrai calcul d'itinéraire RATP/MTA */
function tripSuggestion(lat1,lng1,lat2,lng2){
  const km = haversine(lat1,lng1,lat2,lng2);
  if(km < 0.15) return {mode:'à pied', icon:'🚶', mins:Math.max(2, Math.round(km*13))};
  if(km < 1.3)  return {mode:'à pied', icon:'🚶', mins:Math.round(km*13)};
  if(km < 9)    return {mode:'métro', icon:'🚇', mins:Math.round(km*3 + 9)};
  return {mode:'Uber / taxi', icon:'🚕', mins:Math.round(km*2.2 + 6)};
}

async function loadWeather(){
  try{
    const start = DAYS[0][0], end = DAYS[7][0];
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${HOTEL.lat}&longitude=${HOTEL.lng}&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=America%2FNew_York&start_date=${start}&end_date=${end}&temperature_unit=fahrenheit`;
    const r = await fetch(url);
    const d = await r.json();
    if(!d.daily || !d.daily.time) return;
    DAYS.forEach((day, i) => {
      const idx = d.daily.time.indexOf(day[0]);
      if(idx === -1){ WX[i] = null; return; }
      const wc = d.daily.weathercode[idx];
      const [icon] = WCODE[wc] || ['🌡️',''];
      WX[i] = {icon, tmax:Math.round(d.daily.temperature_2m_max[idx]), tmin:Math.round(d.daily.temperature_2m_min[idx])};
    });
  }catch(e){ /* pas de réseau ou API indisponible : on affiche juste "pas encore dispo" */ }
}

let imgCache = {}, imgT;
function saveImg(){ clearTimeout(imgT); imgT = setTimeout(() => store.set(IMG_KEY, JSON.stringify(imgCache)), 900); }
async function loadImg(){ try{ const v = await store.get(IMG_KEY); if(v) imgCache = JSON.parse(v); }catch(e){} }
const PEND = {};
const WIKI = 'https://en.wikipedia.org/w/api.php';
const words = s => s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').match(/[a-z0-9]{3,}/g) || [];
function pick(pages, name){
  const nw = new Set(words(name));
  let best = null, bs = -1;
  for(const p of pages){
    if(!p.thumbnail) continue;
    const sc = words(p.title).reduce((a,w) => a + (nw.has(w)?1:0), 0);
    if(sc > bs){ best = p; bs = sc; }
  }
  if(best && bs > 0) return best.thumbnail.source;
  const f = pages.find(p => p.thumbnail);
  return f ? f.thumbnail.source : null;
}
async function wj(p){ const r = await fetch(WIKI + '?origin=*&format=json&action=query&' + p); return r.json(); }
function spotImg(sp, cb){
  const k = sp.name;
  if(imgCache[k] !== undefined){ cb(imgCache[k]); return; }
  if(PEND[k]){ PEND[k].push(cb); return; }
  PEND[k] = [cb];
  const done = u => { imgCache[k] = u || null; saveImg(); (PEND[k]||[]).forEach(f => f(u||null)); delete PEND[k]; };
  (async () => {
    try{
      let u = null;
      if(sp.lat != null){
        const d = await wj(`generator=geosearch&ggscoord=${sp.lat}%7C${sp.lng}&ggsradius=400&ggslimit=8&prop=pageimages&piprop=thumbnail&pithumbsize=640`);
        u = pick(d.query ? Object.values(d.query.pages||{}) : [], k);
      }
      if(!u){
        const q = k.replace(/—.*$/,'').replace(/\(.*?\)/g,'').trim();
        const d = await wj(`generator=search&gsrsearch=${encodeURIComponent(q+' New York')}&gsrlimit=3&prop=pageimages&piprop=thumbnail&pithumbsize=640`);
        u = pick(d.query ? Object.values(d.query.pages||{}) : [], k);
      }
      done(u);
    }catch(e){ done(null); }
  })();
}
const io = ('IntersectionObserver' in window) ? new IntersectionObserver(es => {
  es.forEach(en => {
    if(!en.isIntersecting) return;
    io.unobserve(en.target);
    const el = en.target;
    spotImg({name:el.dataset.img, lat:el.dataset.lat?+el.dataset.lat:null, lng:el.dataset.lng?+el.dataset.lng:null},
      u => { if(!u) return; if(el.tagName === 'IMG') el.src = u; else el.style.backgroundImage = `url("${u}")`; });
  });
}, {rootMargin:'200px'}) : null;
function watch(root){
  (root||document).querySelectorAll('[data-img]:not(.seen)').forEach(el => {
    el.classList.add('seen');
    if(io) io.observe(el);
  });
}

  $('#tl').classList.toggle('today-mode', todayMode);

  const tl = $('#tl');
  const firstStop = d.stops.find(s => s.lat != null);
  const lastStop = [...d.stops].reverse().find(s => s.lat != null);
  const hotelRow = (label, stop, dir) => {
    if(!stop) return '';
    const from = dir === 'go' ? HOTEL : stop, to = dir === 'go' ? stop : HOTEL;
    const t = tripSuggestion(from.lat, from.lng, to.lat, to.lng);
    return `<div class="hrow">
      <span class="hicon">${dir==='go'?'🏨':t.icon}</span>
      <span class="htx"><b>${label}</b><span>${t.icon} ${t.mode} · environ ${t.mins} min (estimation à vol d'oiseau)</span></span>
      <a class="hnav" href="${mapsUrl(to===HOTEL?HOTEL.name:to.name, to.lat, to.lng)}" target="_blank" rel="noopener">Itinéraire ↗</a>
    </div>`;
  };
  if(!d.stops.length){
    tl.innerHTML = `<div class="blank">Aucun lieu pour ce jour.<br>Pioche dans la bibliothèque (${LIB.length} adresses géolocalisées) ou crée la tienne.</div>`;
    return;
  }
  tl.innerHTML = hotelRow(`Départ — ${HOTEL.name}`, firstStop, 'go') + d.stops.map((s,j) => {
    const active = j === S.sel;
    const c = pcol(j);
    const edNote = editTarget && editTarget.i === j && editTarget.field === 'note';
    return `<div class="st ${s.done?'done':''}" data-i="${j}">
      <span class="gut"><span class="num" style="background:${c}">${j+1}</span><span class="bar"></span></span>
      <span class="bd">
        <span class="r1">
          <span class="nm-tx" data-i="${j}">${esc(s.name)}</span>
          <input class="tm" data-f="time" data-i="${j}" value="${esc(s.time||'')}" placeholder="--:--" maxlength="5">
        </span>
        <span class="ct">${esc(CATS[s.cat].label)}${s.area?' · '+esc(s.area):''}${s.essential?' <span class="must">★ Incontournable</span>':''}</span>
        ${active ? `<span class="card">
          <img data-img="${esc(s.name)}" ${s.lat!=null?`data-lat="${s.lat}" data-lng="${s.lng}"`:''} alt="">
          <span class="in">
            ${edNote
              ? `<textarea class="note-in" data-f="note" data-i="${j}" rows="3" placeholder="Ta note…">${esc(s.note||'')}</textarea>`
              : `<p class="note-tx" data-i="${j}">${s.note?esc(s.note):'<i>Aucune note</i>'}<button data-a="editnote" data-i="${j}" class="pencil">✎</button></p>`}
            <span class="costrow"><label>Budget</label><input class="cost-in" data-f="cost" data-i="${j}" type="number" inputmode="decimal" placeholder="0" value="${s.cost!=null?s.cost:''}"><span>$</span></span>
          </span>
        </span>
        <span class="acts">
          ${s.lat!=null?`<a href="${mapsUrl(s.name,s.lat,s.lng)}" target="_blank" rel="noopener" class="go-nav">↗ Itinéraire</a>`:''}
          <button data-a="up" data-i="${j}">↑</button>
          <button data-a="down" data-i="${j}">↓</button>
          <button data-a="done" data-i="${j}">${s.done?'À refaire':'✓ Fait'}</button>
          <button data-a="del" data-i="${j}" class="warn">Supprimer</button>
        </span>` : ''}
      </span>
      ${!active ? `<span class="thumb" data-img="${esc(s.name)}" ${s.lat!=null?`data-lat="${s.lat}" data-lng="${s.lng}"`:''}></span>` : ''}
    </div>`;
  }).join('') + hotelRow(`Retour — ${HOTEL.name}`, lastStop, 'back');
  const edEl = tl.querySelector('.nm-in, .note-in');
  if(edEl){ edEl.focus(); if(edEl.setSelectionRange) edEl.setSelectionRange(edEl.value.length, edEl.value.length); }
  tl.querySelectorAll('textarea').forEach(autosize);
  watch(tl);
}

/* ═══════ 8. Carte satellite ═══════ */
function mapsUrl(name, lat, lng){
  return `https://maps.apple.com/?q=${encodeURIComponent(name)}&ll=${lat},${lng}`;
}
let map, layer, mapAll, layerAll;
function baseTile(){
  return L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    maxZoom:20, subdomains:'abcd', attribution:'© OpenStreetMap · © CARTO'
  });
}
function initMap(){
  map = L.map('map', {zoomControl:false, attributionControl:true}).setView([40.73,-73.99], 12);
  L.control.zoom({position:'bottomright'}).addTo(map);
  baseTile().addTo(map);
  layer = L.layerGroup().addTo(map);
}
function initMapAll(){
  mapAll = L.map('mapAll', {zoomControl:false, attributionControl:true}).setView([40.72,-73.97], 12);
  L.control.zoom({position:'bottomright'}).addTo(mapAll);
  baseTile().addTo(mapAll);
  layerAll = L.layerGroup().addTo(mapAll);
}
function popHtml(s, u){
  return `<span class="pop">${u?`<img src="${u}" alt="">`:''}<div><b>${esc(s.name)}</b>
    <s>${esc(CATS[s.cat].label)}${s.time?' · '+esc(s.time):''}</s>
    ${s.lat!=null?`<a class="nav" href="${mapsUrl(s.name,s.lat,s.lng)}" target="_blank" rel="noopener">Itinéraire ↗</a>`:''}</div></span>`;
}
function pinIcon(color, sz, glyph, active, ring){
  return L.divIcon({className:'', iconSize:[sz,sz], iconAnchor:[sz/2, sz],
    html:`<span class="pin"><i style="width:${sz}px;height:${sz}px;background:${color};${ring||''}"><s>${glyph}</s></i></span>`});
}
const NEARBY_KM = 0.9; // rayon "à proximité" pour suggérer magasins/spots photo non ajoutés au jour
function drawMap(fit){
  if(!map) return;
  layer.clearLayers();
  const d = cur();
  const usedNames = new Set(d.stops.map(s => s.name));

  // Tous les lieux explicitement dans l'itinéraire du jour (quelle que soit leur catégorie)
  // suivent le trait rouge, dans l'ordre. Seules les suggestions de la bibliothèque
  // (magasins/spots photo pas encore ajoutés, mais proches) sont en secondaire.
  const fullPts = [{lat:HOTEL.lat, lng:HOTEL.lng}];
  d.stops.forEach(s => { if(s.lat != null) fullPts.push({lat:s.lat, lng:s.lng}); });

  const nearest = (lat, lng) => {
    let best = null, bd = Infinity;
    fullPts.forEach(p => {
      const dist = haversine(lat, lng, p.lat, p.lng);
      if(dist < bd){ bd = dist; best = p; }
    });
    return {point:best, dist:bd};
  };

  const pts = fullPts.map(p => [p.lat, p.lng]);
  const hm = L.marker([HOTEL.lat, HOTEL.lng], {zIndexOffset:3000,
    icon: pinIcon('#14110C', 34, '🏨')}).addTo(layer);
  hm.bindPopup(popHtml({name:HOTEL.name, cat:'hotel', time:''}, null), {closeButton:false, offset:[0,-30]});

  d.stops.forEach((s,j) => {
    if(s.lat == null) return;
    const active = j === S.sel, sz = active ? 38 : 30;
    const c = s.cat === 'shop' ? CATS.shop.color : pcol(j);
    const glyph = s.cat === 'shop' ? CATS.shop.icon : (j+1);
    const ring = s.essential ? `outline:3px solid #FFD166; outline-offset:2px;` : '';
    const m = L.marker([s.lat, s.lng], {
      zIndexOffset: active ? 2000 : 100,
      icon: pinIcon(c, sz, glyph, active, ring)
    }).addTo(layer);
    m.on('click', () => { S.sel = j; drawDetail(); drawMap(false);
      const el = document.querySelector(`.st[data-i="${j}"]`);
      if(el) el.scrollIntoView({behavior:'smooth', block:'center'});
    });
    m.bindPopup(popHtml(s, imgCache[s.name] || null), {closeButton:false, offset:[0,-30]});
    m.on('popupopen', e => spotImg(s, u => { if(u && m.isPopupOpen()) e.popup.setContent(popHtml(s, u)); }));
  });

  // suggestions : magasins/spots photo de la bibliothèque, proches d'un point du jour, pas déjà ajoutés
  const sideLines = [];
  LIB.forEach(l => {
    const [name, cat, lat, lng, area, note] = l;
    if(cat !== 'shop' && cat !== 'photo') return;
    if(usedNames.has(name)) return;
    const {point, dist} = nearest(lat, lng);
    if(!point || dist > NEARBY_KM) return;
    const sug = {name, cat, lat, lng, area, note, time:''};
    const m = L.marker([lat, lng], {
      zIndexOffset:50,
      icon: pinIcon(CATS[cat].color, 22, CATS[cat].icon)
    }).addTo(layer);
    m.setOpacity(0.72);
    m.bindPopup(popHtml(sug, imgCache[name] || null), {closeButton:false, offset:[0,-22]});
    m.on('popupopen', e => spotImg(sug, u => { if(u && m.isPopupOpen()) e.popup.setContent(popHtml(sug, u)); }));
    sideLines.push([[lat, lng], [point.lat, point.lng]]);
  });

  // itinéraire principal : trait rouge continu, dans l'ordre exact du jour
  if(pts.length > 1)
    L.polyline(pts, {color:'#D9401F', weight:3, opacity:.9, lineCap:'round', lineJoin:'round'}).addTo(layer);
  // magasins/spots photo suggérés : trait secondaire discret vers le point le plus proche du jour
  sideLines.forEach(([a,b]) => {
    L.polyline([a,b], {color:'#9C9186', weight:1.3, opacity:.4, dashArray:'1 6', lineCap:'round'}).addTo(layer);
  });
  if(fit && pts.length) map.fitBounds(pts, {padding:[54,54], maxZoom:15});
  if(showMetro) drawSubway(layer);
}

let showMetro = false, showMetroAll = false;
function drawSubway(targetLayer){
  SUBWAY_LINES.forEach(line => {
    const coords = line.st.map(name => SUBWAY_ST[name]).filter(Boolean);
    if(coords.length > 1) L.polyline(coords, {color:line.color, weight:3, opacity:.55, lineCap:'round', lineJoin:'round'}).addTo(targetLayer);
    coords.forEach((c,i) => {
      const stName = line.st[i];
      const m = L.marker(c, {zIndexOffset:10, icon: L.divIcon({className:'', iconSize:[9,9], iconAnchor:[4,4],
        html:`<span style="display:block;width:9px;height:9px;border-radius:50%;background:#fff;border:2.5px solid ${line.color};box-shadow:0 1px 3px rgba(0,0,0,.4)"></span>`})
      }).addTo(targetLayer);
      m.bindPopup(`<span class="pop"><div><b>${esc(stName.split('-')[0])}</b><s>Ligne ${line.name}</s></div></span>`, {closeButton:false, offset:[0,-10]});
    });
  });
}

let allFilter = 'all';
function drawMapAll(fit){
  if(!mapAll) return;
  layerAll.clearLayers();
  const pts = [[HOTEL.lat, HOTEL.lng]];
  const hm = L.marker([HOTEL.lat, HOTEL.lng], {zIndexOffset:3000,
    icon: pinIcon('#14110C', 30, '🏨')}).addTo(layerAll);
  hm.bindPopup(popHtml({name:HOTEL.name, cat:'hotel', time:''}, null), {closeButton:false, offset:[0,-26]});
  LIB.forEach(l => {
    const [name, cat, lat, lng, area, note] = l;
    if(allFilter !== 'all' && cat !== allFilter) return;
    pts.push([lat, lng]);
    const s = {name, cat, lat, lng, area, note};
    const m = L.marker([lat, lng], {
      icon: pinIcon(CATS[cat].color, 26, CATS[cat].icon)
    }).addTo(layerAll);
    m.bindPopup(popHtml(s, imgCache[name] || null), {closeButton:false, offset:[0,-24]});
    m.on('popupopen', e => spotImg(s, u => { if(u && m.isPopupOpen()) e.popup.setContent(popHtml(s, u)); }));
  });
  if(fit && pts.length) mapAll.fitBounds(pts, {padding:[40,40], maxZoom:15});
  if(showMetroAll) drawSubway(layerAll);
}

/* ═══════ 9. Navigation ═══════ */
function go(v){
  S.view = v;
  $('#vList').classList.toggle('on', v === 'list');
  $('#vDetail').classList.toggle('on', v === 'detail');
  $('#vMapAll').classList.toggle('on', v === 'mapAll');
  if(v === 'detail'){
    drawDetail();
    setTimeout(() => { map.invalidateSize(); drawMap(true); }, 60);
  } else if(v === 'mapAll'){
    if(!mapAll) initMapAll();
    drawLegend();
    setTimeout(() => { mapAll.invalidateSize(); drawMapAll(true); }, 60);
  } else drawList();
}
function drawLegend(){
  const cats = ['all', ...Object.keys(CATS).filter(k => k !== 'custom')];
  $('#legend').innerHTML = cats.map(k =>
    `<button class="f ${allFilter===k?'on':''}" data-af="${k}">${k==='all'?'Tout':CATS[k].icon+' '+CATS[k].label}</button>`).join('');
  const n = allFilter === 'all' ? LIB.length : LIB.filter(l => l[1] === allFilter).length;
  $('#allCount').textContent = n + (n>1?' lieux':' lieu');
  $('#legend').onclick = e => {
    const b = e.target.closest('[data-af]'); if(!b) return;
    allFilter = b.dataset.af;
    drawLegend(); drawMapAll(true);
  };
}

function refresh(){ drawDetail(); drawMap(false); drawList(); save(); }

/* ═══════ 10. Tiroirs ═══════ */
let filter = 'all', q = '';
function openLib(){
  $('#drawer').innerHTML = `
    <div class="dh">
      <div class="grab"></div>
      <div class="r"><h2>Bibliothèque</h2><button class="x" data-close>Fermer</button></div>
      <input class="srch" id="q" placeholder="Chercher un lieu, un quartier…" value="${esc(q)}">
      <div class="fl" id="fl">
        ${['all','photo','shop','culture','icon','food','park'].map(k =>
          `<button class="f ${filter===k?'on':''}" data-f="${k}">${k==='all'?'Tout':CATS[k].label}</button>`).join('')}
      </div>
    </div>
    <div class="lst" id="lst"></div>`;
  $('#scrim').classList.add('on');
  drawLst();
  $('#q').oninput = e => { q = e.target.value; drawLst(); };
  $('#fl').onclick = e => {
    const b = e.target.closest('[data-f]'); if(!b) return;
    filter = b.dataset.f;
    $('#fl').querySelectorAll('.f').forEach(x => x.classList.toggle('on', x.dataset.f === filter));
    drawLst();
  };
}
function drawLst(){
  const used = new Set(cur().stops.map(s => s.name));
  const n = q.trim().toLowerCase();
  const rows = LIB.filter(l => (filter==='all' || l[1]===filter) &&
    (!n || (l[0]+' '+l[4]+' '+l[5]).toLowerCase().includes(n)));
  $('#lst').innerHTML = rows.length ? rows.map(l => `
    <div class="it ${used.has(l[0])?'used':''}">
      <button class="itmain" data-k="${LIB.indexOf(l)}">
        <span class="tx"><b>${esc(l[0])}</b><s>${esc(l[4])} · ${esc(CATS[l[1]].label)}</s><p>${esc(l[5])}</p></span>
        <span class="pl">＋</span>
      </button>
      <a class="itnav" href="${mapsUrl(l[0],l[2],l[3])}" target="_blank" rel="noopener" aria-label="Itinéraire">↗</a>
    </div>`).join('')
    : `<div class="blank">Rien ne correspond. Essaie un autre mot, ou crée le lieu toi-même.</div>`;
  $('#lst').onclick = e => {
    const b = e.target.closest('[data-k]'); if(!b) return;
    const l = LIB[+b.dataset.k];
    cur().stops.push({id:uid(), name:l[0], cat:l[1], lat:l[2], lng:l[3], area:l[4], note:l[5], time:'', done:false, cost:null});
    b.closest('.it').classList.add('used');
    refresh();
    toast(`Ajouté au jour ${S.day+1}`);
  };
}
function openNew(){
  $('#drawer').innerHTML = `
    <div class="dh">
      <div class="grab"></div>
      <div class="r"><h2>Créer un lieu</h2><button class="x" data-close>Fermer</button></div>
    </div>
    <div class="form">
      <div class="fld"><label>Nom</label><input id="cName" placeholder="ex. Rooftop du Wythe Hotel"></div>
      <div class="fld"><label>Catégorie</label>
        <div class="fl" id="cCat">${Object.keys(CATS).map(k =>
          `<button class="f ${k==='custom'?'on':''}" data-c="${k}">${CATS[k].label}</button>`).join('')}</div>
      </div>
      <div class="fld"><label>Coordonnées (optionnel)</label><input id="cGps" placeholder="40.7218, -73.9580"></div>
      <div class="hint">Sur Google Maps : appui long sur le lieu, les coordonnées s'affichent, un appui les copie. Sans coordonnées, le lieu reste dans la liste mais pas sur le plan.</div>
      <div class="fld"><label>Note</label><textarea id="cNote" placeholder="Horaires, réservation, ce que tu veux y shooter…"></textarea></div>
      <button class="go" id="cAdd">Ajouter au jour ${S.day+1}</button>
    </div>`;
  $('#scrim').classList.add('on');
  let cat = 'custom';
  $('#cCat').onclick = e => {
    const b = e.target.closest('[data-c]'); if(!b) return;
    cat = b.dataset.c;
    $('#cCat').querySelectorAll('.f').forEach(x => x.classList.toggle('on', x.dataset.c === cat));
  };
  $('#cAdd').onclick = () => {
    const name = $('#cName').value.trim();
    if(!name){ $('#cName').focus(); toast('Il manque le nom'); return; }
    const m = $('#cGps').value.match(/(-?\d+\.\d+)[,\s]+(-?\d+\.\d+)/);
    cur().stops.push({id:uid(), name, cat, lat:m?+m[1]:null, lng:m?+m[2]:null, area:'',
      note:$('#cNote').value.trim(), time:'', done:false, cost:null});
    refresh(); closeD(); toast('Lieu créé');
  };
}
function closeD(){ $('#scrim').classList.remove('on'); }

/* ═══════ 11. Export ═══════ */
function exportTxt(){
  let o = `NEW YORK — 4 au 11 août 2026\n${'='.repeat(34)}\n`;
  S.days.forEach((d,i) => {
    o += `\nJOUR ${i+1} — ${DAYS[i][2]} ${DAYS[i][3]} août${d.title?' — '+d.title:''}\n`;
    o += `Coucher du soleil ${DAYS[i][5]}\n`;
    if(d.note) o += `${d.note}\n`;
    if(!d.stops.length) o += `  (rien de prévu)\n`;
    d.stops.forEach(s => {
      o += `  ${s.done?'[x]':'[ ]'} ${s.time?s.time+'  ':''}${s.name}\n`;
      if(s.note) o += `        ${s.note}\n`;
      if(s.lat != null) o += `        https://www.google.com/maps?q=${s.lat},${s.lng}\n`;
    });
  });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([o], {type:'text/plain'}));
  a.download = 'new-york-aout-2026.txt'; a.click();
  URL.revokeObjectURL(a.href);
  toast('Fichier téléchargé');
}

/* ═══════ 12. Événements ═══════ */
$('#cards').onclick = e => {
  if(e.target.closest('#btnMapAll')){ go('mapAll'); return; }
  const b = e.target.closest('[data-day]'); if(!b) return;
  S.day = +b.dataset.day; S.sel = 0; go('detail');
};
$('#btnBack').onclick = () => go('list');
$('#btnBackAll').onclick = () => go('list');
$('#btnMetro').onclick = () => {
  showMetro = !showMetro;
  $('#btnMetro').classList.toggle('on', showMetro);
  drawMap(false);
};
$('#btnMetroAll').onclick = () => {
  showMetroAll = !showMetroAll;
  $('#btnMetroAll').classList.toggle('on', showMetroAll);
  drawMapAll(false);
};
$('#btnBig').onclick = () => {
  S.big = !S.big;
  $('#mapbox').classList.toggle('big', S.big);
  $('#btnBig').textContent = S.big ? 'Réduire le plan' : 'Agrandir le plan';
  setTimeout(() => { map.invalidateSize(); drawMap(true); }, 300);
};
$('#dTitle').oninput = e => { cur().title = e.target.value; save(); };
$('#dNote').oninput = e => { cur().note = e.target.value; autosize(e.target); save(); };

$('#tl').addEventListener('input', e => {
  const f = e.target.dataset.f; if(!f) return;
  const s = cur().stops[+e.target.dataset.i];
  if(f === 'cost'){
    s.cost = e.target.value === '' ? null : Number(e.target.value);
    const chip = $('#costChip'), tot = dayCost(cur());
    if(chip){ chip.textContent = `💰 ~${tot}$`; chip.style.display = tot>0 ? '' : 'none'; }
  } else {
    s[f] = e.target.value;
  }
  if(f === 'note') autosize(e.target);
  save();
});
$('#tl').addEventListener('focusout', e => {
  if(e.target.classList.contains('nm-in') || e.target.classList.contains('note-in')){
    editTarget = null; drawDetail();
  }
});
$('#tl').addEventListener('keydown', e => {
  if(e.target.classList.contains('nm-in') && e.key === 'Enter') e.target.blur();
});
$('#tl').addEventListener('click', e => {
  const a = e.target.closest('[data-a]');
  if(a){
    const i = +a.dataset.i, st = cur().stops;
    if(a.dataset.a === 'del'){ st.splice(i,1); S.sel = Math.max(0, Math.min(S.sel, st.length-1)); }
    if(a.dataset.a === 'done') st[i].done = !st[i].done;
    if(a.dataset.a === 'up' && i > 0){ st.splice(i-1, 0, st.splice(i,1)[0]); S.sel = i-1; }
    if(a.dataset.a === 'down' && i < st.length-1){ st.splice(i+1, 0, st.splice(i,1)[0]); S.sel = i+1; }
    if(a.dataset.a === 'editnote'){ editTarget = {i, field:'note'}; drawDetail(); return; }
    refresh(); return;
  }
  if(e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  const row = e.target.closest('.st'); if(!row) return;
  S.sel = +row.dataset.i;
  editTarget = null;
  drawDetail(); drawMap(false);
});

$('#btnLib').onclick = openLib;
$('#btnNew').onclick = openNew;
$('#btnExport').onclick = exportTxt;
$('#btnToday').onclick = () => { todayMode = !todayMode; drawDetail(); };
$('#scrim').addEventListener('click', e => {
  if(e.target === $('#scrim') || e.target.closest('[data-close]')) closeD();
});
document.addEventListener('keydown', e => { if(e.key === 'Escape'){ closeD(); if(S.view === 'detail') go('list'); } });

/* ═══════ 13. Hors ligne ═══════ */
if('serviceWorker' in navigator && location.protocol === 'https:'){
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(()=>{}));
}

/* ═══════ 14. Démarrage ═══════ */
(async () => {
  await loadImg();
  await load();
  initMap();
  drawList();
  loadWeather().then(() => { if(S.view === 'detail') drawDetail(); });
})();
</script>
